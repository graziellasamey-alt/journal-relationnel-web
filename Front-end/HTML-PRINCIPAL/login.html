<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Connexion - AMU Connect</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/Front-end/CSS-PRINCIPAL/login.css">

</head>

<body>

<!-- ======================
HEADER
====================== -->

<header class="header">

<div class="header-box">

<!-- logo -->
<div class="logo">

<div class="logo-icon">🎓</div>

<div class="logo-text">
<div class="logo-title">AMU Connect</div>
<div class="logo-sub">Aix-Marseille Université</div>
</div>

</div>

<!-- boutons -->
<div class="header-actions">

<button class="login-link">Se connecter</button>

<button class="btn">S'inscrire</button>

</div>

</div>

</header>

<!-- ======================
SECTION LOGIN
====================== -->

<section class="login-section">

<!-- bloc gauche : image -->

<div class="login-image">

<img src="/Front-end/image1.jpeg">

</div>

<!-- bloc droit : formulaire -->

<div class="login-card">

<!-- petit logo -->

<div class="card-logo">

<div class="card-logo-icon">🎓</div>

<div>
<strong>AMU Connect</strong><br>
<span style="font-size:13px;color:#7b8ca3">Espace étudiant</span>
</div>

</div>

<!-- titre -->

<h2 class="login-title">Connexion</h2>

<p class="login-desc">
Accédez à votre compte pour continuer vos études
</p>

<!-- champ email -->

<div class="form-group">

<label>Email universitaire</label>

<input type="email" placeholder="prenom.nom@etu.univ-amu.fr">

</div>

<!-- champ mot de passe -->

<div class="form-group">

<label>Mot de passe</label>

<input type="password" placeholder="••••••••">

</div>

<!-- options -->

<div class="form-options">

<label>
<input type="checkbox"> Se souvenir de moi
</label>

<a href="#">Mot de passe oublié ?</a>

</div>

<!-- bouton -->

<button class="login-btn">
Se connecter →
</button>

</div>

</section>

</body>
</html>
