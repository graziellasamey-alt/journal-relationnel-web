<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil - AMU Connect</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="/Front-end/CSS-PRINCIPAL/profil.css">
    <link rel="stylesheet" href="/Front-end/CSS-PRINCIPAL/header.css">
    <link rel="stylesheet" href="/Front-end/CSS-PRINCIPAL/footer.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <script src="/Front-end/JAVASCRIPT-PRINCIPAL/header.js" defer></script>
    <script src="/Front-end/JAVASCRIPT-PRINCIPAL/footer.js" defer></script>
</head>

<body>

    <div id="header"></div>

    <main class="profile-page">
        <div class="container">

            <section class="profile-card">

                <div class="profile-cover"></div>

                <div class="profile-content">

                    <div class="profile-head">

                        <div class="profile-user">

                            <div class="avatar">
                                JD
                                <div class="avatar-badge">
                                    <i class="fa-solid fa-trophy"></i>
                                </div>
                            </div>

                            <div class="profile-text">
                                <h1 class="profile-name">Jean Dupont</h1>

                                <div class="profile-meta">
                                    <span class="meta-tag blue">L3</span>
                                    <span class="meta-tag gray">Informatique</span>
                                    
                                </div>
                            </div>

                        </div>

                        <a href="edit-profil.html" class="edit-btn">
                            <i class="fa-solid fa-pen"></i>
                            Modifier le profil
                        </a>

                    </div>

                    <p class="profile-bio">
                        Passionné par le développement web et l'algorithmique.
                        Toujours prêt à aider mes camarades !
                    </p>

                    <div class="profile-info">

                        <div class="info-item">
                            <i class="fa-regular fa-envelope"></i>
                            jean.dupont@etu.univ-amu.fr
                        </div>

                        <div class="info-item">
                            <i class="fa-solid fa-book-open"></i>
                            Informatique
                        </div>

                    </div>

                    

                </div>
            </section>

            <section class="tabs">
                <a href="mes_questions.html" class="tab active">
                    <i class="fa-solid fa-comments"></i>
                    Mes questions favorites
                </a>

                <a href="resources.html" class="tab">
                    <i class="fa-solid fa-book"></i>
                    Mes ressources
                </a>
            </section>

        </div>
    </main>

    <div id="footer"></div>

</body>
</html>
