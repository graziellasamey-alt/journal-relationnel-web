<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil - AMU Connect</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='CSS-PRINCIPAL/profil.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='CSS-PRINCIPAL/header.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='CSS-PRINCIPAL/footer.css') }}">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <script src="{{ url_for('static', filename='JAVASCRIPT-PRINCIPAL/header.js') }}" defer></script>
    <script src="{{ url_for('static', filename='JAVASCRIPT-PRINCIPAL/footer.js') }}" defer></script>
</head>

<body>

    <div id="header"></div>

    <main class="profile-page">
        <div class="container">

            <section class="profile-card">

                <div class="profile-cover"></div>

                <div class="profile-content">

                    <div class="profile-head">

                        <div class="profile-user">

                            <div class="avatar">
                                {{ user["prenom"][0] }}{{ user["nom"][0] }}
                                <div class="avatar-badge">
                                    <i class="fa-solid fa-trophy"></i>
                                </div>
                            </div>

                            <div class="profile-text">
                                <h1 class="profile-name">{{ user["prenom"] }} {{ user["nom"] }}</h1>

                                <div class="profile-meta">
                                    <span class="meta-tag blue">{{ user["study_year"] }}</span>
                                    <span class="meta-tag gray">{{ user["field_of_study"] }}</span>
                                </div>
                            </div>

                        </div>

                        <a href="#" class="edit-btn">
                            <i class="fa-solid fa-pen"></i>
                            Modifier le profil
                        </a>

                    </div>

                    <p class="profile-bio">
                        Bienvenue sur votre espace profil AMU Connect.
                    </p>

                    <div class="profile-info">

                        <div class="info-item">
                            <i class="fa-regular fa-envelope"></i>
                            {{ user["email"] }}
                        </div>

                        <div class="info-item">
                            <i class="fa-solid fa-book-open"></i>
                            {{ user["field_of_study"] }}
                        </div>

                    </div>

                </div>
            </section>

            <section class="tabs">
                <a href="{{ url_for('questions.my_questions') }}" class="tab active">
                    <i class="fa-solid fa-comments"></i>
                    Mes questions
                </a>

                <a href="{{ url_for('resources.favorite_resources') }}" class="tab">
                    <i class="fa-solid fa-book"></i>
                    Mes ressources
                </a>
            </section>

        </div>
    </main>

    <div id="footer"></div>

</body>
</html>
