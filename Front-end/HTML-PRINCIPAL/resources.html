<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ressources - AMU Connect</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/Front-end/CSS-PRINCIPAL/resources.css">
    <link rel="stylesheet" href="/Front-end/CSS-PRINCIPAL/header.css">
    <link rel="stylesheet" href="/Front-end/CSS-PRINCIPAL/footer.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <script src="/Front-end/JAVASCRIPT-PRINCIPAL/header.js" defer></script>
    <script src="/Front-end/JAVASCRIPT-PRINCIPAL/event.js" defer></script>
    <script src="/Front-end/JAVASCRIPT-PRINCIPAL/footer.js" defer></script>
</head>
<body>

    <div id="header"></div>

    <main class="resources-page">
        <div class="container">

            <section class="tools-row">
                <div class="search-box">
                    <div class="search-icon">
                        <i class="fa-solid fa-magnifying-glass"></i>
                    </div>
                    <input type="text" placeholder="Rechercher des ressources...">
                </div>

                <div class="filter">
                    <select>
                        <option>Type</option>
                        <option>TD</option>
                        <option>TP</option>
                        <option>Examen</option>
                        <option>Fiche</option>
                    </select>
                </div>

                <div class="filter">
                    <select>
                        <option>Niveau</option>
                        <option>L1</option>
                        <option>L2</option>
                        <option>L3</option>
                        <option>M1</option>
                        <option>M2</option>
                    </select>
                </div>

                
            </section>

            <div class="action-row">
                <button id="openForm" class="btn btn-outline" type="button">
                    <i class="fa-solid fa-upload"></i>
                    Ajouter une ressource
                </button>
            </div>

            <div id="formBox" class="form-box hidden">
                <select>
                    <option>Type</option>
                    <option>TD</option>
                    <option>TP</option>
                    <option>Examen</option>
                    <option>Fiche</option>
                </select>

                <input type="text" placeholder="Titre">
                <input type="text" placeholder="Matière">
                <input type="file">

                <button class="btn btn-primary" type="button">Ajouter</button>
            </div>

            <div id="resourcesList"></div>

            <section class="cards">

                <article class="card">
                    <div class="card-top">
                        <div class="card-icon icon-blue">
                            <i class="fa-solid fa-file-lines"></i>
                        </div>

                        <div class="top-right">
                            <span class="mini-tag blue">TD</span>
                        </div>
                    </div>

                    <h2 class="card-title">TD Algèbre Linéaire</h2>

                    <p class="card-text">
                        Tous les exercices avec corrections détaillées.
                    </p>

                    <div class="meta-line">
                        <span class="tag tag-gray">L2</span>
                        <span class="tag tag-blue">Mathématiques</span>
                    </div>

                    <div class="card-bottom">
                        <button class="download-btn" type="button">
                            <i class="fa-solid fa-download"></i>
                            Télécharger
                        </button>
                    </div>
                </article>

                <article class="card">
                    <div class="card-top">
                        <div class="card-icon icon-green">
                            <i class="fa-solid fa-code"></i>
                        </div>

                        <div class="top-right">
                            <span class="mini-tag green">TP</span>
                            
                        </div>
                    </div>

                    <h2 class="card-title">TP Java POO</h2>

                    <p class="card-text">
                        TP avancé avec code source.
                    </p>

                    <div class="meta-line">
                        <span class="tag tag-gray">L3</span>
                        <span class="tag tag-blue">Informatique</span>
                    </div>

                    <div class="card-bottom">
                        
                        <button class="download-btn" type="button">
                            <i class="fa-solid fa-download"></i>
                            Télécharger
                        </button>
                    </div>
                </article>

                <article class="card">
                    <div class="card-top">
                        <div class="card-icon icon-orange">
                            <i class="fa-solid fa-file"></i>
                        </div>

                        <div class="top-right">
                            <span class="mini-tag orange">Examen</span>
                            
                        </div>
                    </div>

                    <h2 class="card-title">Annales Mécanique Quantique</h2>

                    <p class="card-text">
                        Sujets + corrigés.
                    </p>

                    <div class="meta-line">
                        <span class="tag tag-gray">M1</span>
                        <span class="tag tag-blue">Physique</span>
                    </div>

                    <div class="card-bottom">
                        <button class="download-btn" type="button">
                            <i class="fa-solid fa-download"></i>
                            Télécharger
                        </button>
                    </div>
                </article>

            </section>
        </div>
    </main>

    <div id="footer"></div>

</body>
</html>
