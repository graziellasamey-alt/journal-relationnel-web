<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poser une question - AMU Connect</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='CSS-PRINCIPAL/header.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='CSS-PRINCIPAL/footer.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='CSS-PRINCIPAL/ask.css') }}">
    <script src="{{ url_for('static', filename='JAVASCRIPT-PRINCIPAL/header.js') }}" defer></script>
    <script src="{{ url_for('static', filename='JAVASCRIPT-PRINCIPAL/footer.js') }}" defer></script>
</head>
<body>

    <div id="header"></div>

    <main class="container" style="max-width: 800px; margin: 40px auto;">
        <a href="{{ url_for('questions.list_questions') }}">← Retour au forum</a>

        <h1>Poser une question</h1>
        <p>Décrivez clairement votre problème pour obtenir de meilleures réponses.</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <div class="flash-messages">
                    {% for category, message in messages %}
                        <p class="flash-message {{ category }}">{{ message }}</p>
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('questions.add_question') }}">
            <div style="margin-bottom: 15px;">
                <label for="title">Titre</label><br>
                <input type="text" id="title" name="title" required style="width:100%; padding:10px;">
            </div>

            <div style="margin-bottom: 15px;">
                <label for="subject">Matière</label><br>
                <input type="text" id="subject" name="subject" required style="width:100%; padding:10px;">
            </div>

            <div style="margin-bottom: 15px;">
                <label for="target_year">Année ciblée</label><br>
                <select id="target_year" name="target_year" required style="width:100%; padding:10px;">
                    <option value="">Choisir une année</option>
                    <option value="L1">L1</option>
                    <option value="L2">L2</option>
                    <option value="L3">L3</option>
                    <option value="M1">M1</option>
                    <option value="M2">M2</option>
                    <option value="all">Toutes</option>
                </select>
            </div>

            <div style="margin-bottom: 15px;">
                <label for="target_scope">Portée</label><br>
                <select id="target_scope" name="target_scope" required style="width:100%; padding:10px;">
                    <option value="">Choisir la portée</option>
                    <option value="field">Ma filière</option>
                    <option value="all">Tout le monde</option>
                </select>
            </div>

            <div style="margin-bottom: 15px;">
                <label for="description">Description</label><br>
                <textarea id="description" name="description" rows="8" required style="width:100%; padding:10px;"></textarea>
            </div>

            <button type="submit">Publier la question</button>
        </form>
    </main>

    <div id="footer"></div>

</body>
</html>
